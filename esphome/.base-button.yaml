# .base-button.yaml
# Shared config for all Seeed XIAO ESP32-C6 button devices.
# Each button yaml sets substitutions for: device_name, owner, task
# then includes this via packages.

esphome:
  name: "${device_name}"
  friendly_name: "${device_name}"
  on_boot:
    priority: 600
    then:
      - script.execute: run_and_sleep

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: arduino

# Pi IP address — resolved from substitution (set via !secret in each device yaml)
text_sensor:
  - platform: template
    name: "Pi IP"
    id: pi_ip
    lambda: 'return {"${pi_ip}"};'
    update_interval: never

# RGB LED on XIAO ESP32-C6 (WS2812 on GPIO21)
light:
  - platform: neopixelbus
    type: GRB
    variant: WS2812X
    pin: GPIO21
    num_leds: 1
    name: "RGB LED"
    id: rgb_led
  - platform: status_led
    name: "Status LED"
    id: status_led
    pin:
      number: GPIO15
      inverted: true

# External tact switch on D1/GPIO3 (active-low with internal pullup)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO3
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Task Button"
    id: task_button
    filters:
      - delayed_on: 50ms   # debounce
    on_press:
      then:
        - script.execute: do_press

# Buzzer on D2/GPIO4 — short beep for feedback
output:
  - platform: gpio
    pin: GPIO4
    id: buzzer_pin

http_request:
  useragent: "ESPHome Task Button"
  timeout: 5s

script:
  - id: do_press
    then:
      - http_request.post:
          url: !lambda 'return "http://" + id(pi_ip).state + ":8765/press";'
          headers:
            Content-Type: application/json
          body: !lambda |
            return "{\"owner\": \"${owner}\", \"task\": \"${task}\"}";
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    std::string body(data.begin(), data.end());
                    if (body.find("\"ok\"") != std::string::npos) {
                      // Success — green flash + beep
                      id(led_green).execute();
                      id(buzzer_beep).execute();
                    } else if (body.find("\"already_done\"") != std::string::npos) {
                      // Already done — red flash
                      id(led_red).execute();
                    } else {
                      // outside_window or not_today — double red flash
                      id(led_red_double).execute();
                    }
                  }

  - id: led_green
    mode: restart
    then:
      - light.turn_on:
          id: rgb_led
          red: 0%
          green: 100%
          blue: 0%
          brightness: 50%
      - delay: 400ms
      - light.turn_off:
          id: rgb_led

  - id: led_red
    mode: restart
    then:
      - light.turn_on:
          id: rgb_led
          red: 100%
          green: 0%
          blue: 0%
          brightness: 50%
      - delay: 400ms
      - light.turn_off:
          id: rgb_led

  - id: led_red_double
    mode: restart
    then:
      - light.turn_on:
          id: rgb_led
          red: 100%
          green: 0%
          blue: 0%
          brightness: 50%
      - delay: 150ms
      - light.turn_off:
          id: rgb_led
      - delay: 100ms
      - light.turn_on:
          id: rgb_led
          red: 100%
          green: 0%
          blue: 0%
          brightness: 50%
      - delay: 150ms
      - light.turn_off:
          id: rgb_led

  - id: buzzer_beep
    mode: restart
    then:
      - output.turn_on: buzzer_pin
      - delay: 100ms
      - output.turn_off: buzzer_pin

  - id: run_and_sleep
    then:
      - delay: 10s   # max run duration — gives time for WiFi + button press + HTTP
      - deep_sleep.enter: deep_sleep_1

deep_sleep:
  id: deep_sleep_1
  wakeup_pin:
    number: GPIO3
    inverted: true
