# .base-button.yaml
# Shared config for all Seeed XIAO ESP32-C6 button devices.
# Each button yaml sets substitutions for: device_name, owner, task
# then includes this via packages.

esphome:
  name: "${device_name}"
  friendly_name: "${device_name}"
  on_boot:
    priority: 600
    then:
      - script.execute: run_and_sleep

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf
# Note: 'seeed_xiao_esp32c6' board ID is not recognized by the pioarduino platform.
# Use esp32-c6-devkitc-1 — GPIO numbers are the same as XIAO physical pin numbers.

# XIAO ESP32-C6 actual pin map (verified 2026-03-06):
# D0=GPIO0, D1=GPIO1, D2=GPIO2, D3=GPIO21, D4=GPIO22, D5=GPIO23
# GPIO3 is the RF switch power pin (board-internal) — do NOT use for user I/O
# GPIO15 = onboard user LED (active low)
# GPIO21 = plain GPIO, no onboard LED on this form factor

# Pi IP address — resolved from substitution (set via !secret in each device yaml)
text_sensor:
  - platform: template
    name: "Pi IP"
    id: pi_ip
    lambda: 'return {"${pi_ip}"};'
    update_interval: never

# XIAO ESP32-C6 user LED — GPIO15, active low
status_led:
  pin:
    number: GPIO15
    inverted: true

# Passive buzzer on D2 = GPIO2 — driven by PWM (ledc), polarity doesn't matter
output:
  - platform: ledc
    pin: GPIO2
    id: buzzer_out
    frequency: 2000Hz

# External tact switch on D1 = GPIO1 (active-low with internal pullup)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO1
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Task Button"
    id: task_button
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - script.execute: do_press

http_request:
  useragent: "ESPHome Task Button"
  timeout: 5s

script:
  - id: do_press
    then:
      - http_request.post:
          url: !lambda 'return ((std::string)"http://") + id(pi_ip).state + ":8765/press";'
          headers:
            Content-Type: application/json
          body: !lambda |-
            return ((std::string)"{\"owner\": \"${owner}\", \"task\": \"${task}\"}");
          on_response:
            then:
              - lambda: |-
                  std::string body(data.begin(), data.end());
                  if (response->status_code == 200 && body.find("\"ok\"") != std::string::npos) {
                    id(feedback_success).execute();
                  } else if (body.find("\"already_done\"") != std::string::npos) {
                    id(feedback_already).execute();
                  } else {
                    id(feedback_outside).execute();
                  }

  - id: run_and_sleep
    then:
      - delay: 10s
      - deep_sleep.enter: deep_sleep_1

  # Success: two short beeps
  - id: feedback_success
    mode: restart
    then:
      - output.turn_on: buzzer_out
      - delay: 120ms
      - output.turn_off: buzzer_out
      - delay: 100ms
      - output.turn_on: buzzer_out
      - delay: 120ms
      - output.turn_off: buzzer_out

  # Already done today: one long beep
  - id: feedback_already
    mode: restart
    then:
      - output.turn_on: buzzer_out
      - delay: 600ms
      - output.turn_off: buzzer_out

  # Outside window / not_today: three quick beeps
  - id: feedback_outside
    mode: restart
    then:
      - repeat:
          count: 3
          then:
            - output.turn_on: buzzer_out
            - delay: 80ms
            - output.turn_off: buzzer_out
            - delay: 80ms

# Deep sleep — wakeup_pin omitted (ESP-IDF 5.1.5 sleep crash workaround)
# GPIO1 (D1) can be re-added as ext1 wakeup once ESP-IDF sleep is stable
deep_sleep:
  id: deep_sleep_1
